name: Checks

on:
  pull_request:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read

jobs:
  Checks-and-Tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v6

      - name: Validate Build
        run: cargo build

      - name: Check Formatting
        run: cargo fmt --check

      - name: Clippy!
        run: cargo clippy --no-deps --all-targets

      - name: Run Tests
        run: cargo test

      - name: Verify Publish-Ready
        run: cargo publish --dry-run
